<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <g transform="translate(256, 275)">
    <!-- Shadow under turtle -->
    <ellipse cx="0" cy="120" rx="90" ry="18" fill="#0a5c56" opacity="0.3"/>

    <!-- Back feet -->
    <ellipse cx="-70" cy="95" rx="28" ry="20" fill="#34d399" transform="rotate(-10, -70, 95)"/>
    <ellipse cx="70" cy="95" rx="28" ry="20" fill="#34d399" transform="rotate(10, 70, 95)"/>

    <!-- Body/belly visible underneath -->
    <ellipse cx="0" cy="40" rx="95" ry="75" fill="#6ee7b7"/>

    <!-- Shell - main dome -->
    <ellipse cx="0" cy="10" rx="100" ry="85" fill="#2dd4bf"/>
    <!-- Shell highlight -->
    <ellipse cx="-15" cy="-25" rx="60" ry="40" fill="#5eead4" opacity="0.5"/>

    <!-- Shell pattern -->
    <path d="M0,-30 L25,-15 L25,15 L0,30 L-25,15 L-25,-15 Z" fill="none" stroke="#0F766E" stroke-width="3.5" stroke-opacity="0.35"/>
    <path d="M25,-15 L55,-25 L65,0 L55,20 L25,15 Z" fill="none" stroke="#0F766E" stroke-width="3" stroke-opacity="0.25"/>
    <path d="M-25,-15 L-55,-25 L-65,0 L-55,20 L-25,15 Z" fill="none" stroke="#0F766E" stroke-width="3" stroke-opacity="0.25"/>
    <path d="M0,-30 L-25,-15 L-40,-45 L-15,-60 L15,-60 L40,-45 L25,-15 Z" fill="none" stroke="#0F766E" stroke-width="3" stroke-opacity="0.25"/>
    <path d="M0,30 L25,15 L45,40 L25,60 L-25,60 L-45,40 L-25,15 Z" fill="none" stroke="#0F766E" stroke-width="3" stroke-opacity="0.2"/>

    <!-- Left arm/hand holding coin -->
    <ellipse cx="-85" cy="-15" rx="30" ry="18" fill="#34d399" transform="rotate(-20, -85, -15)"/>
    <!-- Right arm/hand holding coin -->
    <ellipse cx="85" cy="-15" rx="30" ry="18" fill="#34d399" transform="rotate(20, 85, -15)"/>

    <!-- Gold £ coin held in front -->
    <circle cx="0" cy="-85" r="48" fill="#FCD34D" stroke="#F59E0B" stroke-width="4"/>
    <circle cx="0" cy="-85" r="38" fill="none" stroke="#FBBF24" stroke-width="2"/>
    <text x="0" y="-70" text-anchor="middle" font-size="50" font-weight="bold" fill="#92400E" font-family="Georgia, 'Times New Roman', serif">£</text>

    <!-- Hands gripping coin (in front of coin) -->
    <ellipse cx="-38" cy="-70" rx="15" ry="12" fill="#34d399" transform="rotate(20, -38, -70)"/>
    <ellipse cx="38" cy="-70" rx="15" ry="12" fill="#34d399" transform="rotate(-20, 38, -70)"/>

    <!-- Head (behind/above coin) -->
    <ellipse cx="0" cy="-120" rx="45" ry="42" fill="#6ee7b7"/>

    <!-- Cheeks -->
    <circle cx="-30" cy="-110" r="10" fill="#a7f3d0" opacity="0.6"/>
    <circle cx="30" cy="-110" r="10" fill="#a7f3d0" opacity="0.6"/>

    <!-- Eyes -->
    <circle cx="-18" cy="-130" r="12" fill="white"/>
    <circle cx="18" cy="-130" r="12" fill="white"/>
    <circle cx="-15" cy="-129" r="7" fill="#134e4a"/>
    <circle cx="21" cy="-129" r="7" fill="#134e4a"/>
    <!-- Eye shine -->
    <circle cx="-13" cy="-132" r="2.5" fill="white"/>
    <circle cx="23" cy="-132" r="2.5" fill="white"/>

    <!-- Happy smile -->
    <path d="M-15,-108 Q0,-96 15,-108" fill="none" stroke="#134e4a" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
