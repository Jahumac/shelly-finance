<!DOCTYPE html>
<html>
<head>
<style>
.hero-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1.5rem;
}
.hero-top > div:first-child {
  flex: 1;
  min-width: 0;
}
.hero-actions-col {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.75rem;
}
.hero-turtle-wrap {
  flex-shrink: 0;
  width: 80px;
  height: 80px;
  background: green;
}
@media (max-width: 768px) {
  .hero-top {
    flex-wrap: wrap;
  }
  .hero-actions-col {
    width: 100%;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: flex-start;
    order: 3;
    margin-top: -0.5rem;
  }
}
</style>
</head>
<body>
<div style="width: 390px; border: 1px solid black; padding: 1rem;">
  <div class="hero-top">
    <div>
      <p>Monthly Update</p>
      <h2>April 2026</h2>
      <p>Shelly's monthly check-in — update your numbers and lock in the snapshot</p>
    </div>
    <div class="hero-actions-col">
      <button>✓ Completed</button>
      <div>◀ April 2026 ▶</div>
    </div>
    <div class="hero-turtle-wrap"></div>
  </div>
</div>
</body>
</html>
